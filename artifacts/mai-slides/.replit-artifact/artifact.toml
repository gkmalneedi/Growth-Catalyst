kind = "slides"
previewPath = "/mai-slides/"
title = "MAI Digital Marketing"
version = "1.0.0"
id = "artifacts/mai-slides"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/mai-slides/" ]
localPort = 20521

[services.development]
run = "pnpm --filter @workspace/mai-slides run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mai-slides", "run", "build" ]
publicDir = "artifacts/mai-slides/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20521"
BASE_PATH = "/mai-slides/"
